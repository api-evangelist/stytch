      required:
      - user_agent
    api_fraud_v1_DomainInformation:
      type: object
      properties:
        has_mx_or_a_record:
          type: boolean
          description: Whether the email has appropriate DNS records to deliver a message.
        is_disposable_domain:
          type: boolean
          description: Whether the email domain is known to be disposable.
      required:
      - has_mx_or_a_record
      - is_disposable_domain
    api_fraud_v1_Fingerprints:
      type: object
      properties:
        network_fingerprint:
          type: string
          description: 'Combination of signals associated with a specific network commonly known as TLS fingerprinting. '
        hardware_fingerprint:
          type: string
          description: Combinations of signals to identify an operating system and architecture.
        browser_fingerprint:
          type: string
          description: Combination of signals to identify a browser and its specific version.
        visitor_fingerprint:
          type: string
          description: Cookie-less way of identifying a unique user.
        visitor_id:
          type: string
          description: The cookie stored on the user's device that uniquely identifies them.
        browser_id:
          type: string
          description: Combination of VisitorID and NetworkFingerprint to create a clear identifier of a browser.
      required:
      - network_fingerprint
      - hardware_fingerprint
      - browser_fingerprint
      - visitor_fingerprint
    api_fraud_v1_IPGeoProperties:
      type: object
      properties:
        city:
          type: string
          description: The city where the IP is located.
        region:
          type: string
          description: The region where the IP is located.
        country:
          type: string
          description: The country where the IP is located.
      required:
      - city
      - region
      - country
    api_fraud_v1_Metadata:
      type: object
      properties:
        external_id:
          type: string
          description: An external ID, such as a user ID, that you wish to associate with the telemetry ID.
        organization_id:
          type: string
          description: The organization ID you wish to associate with the telemetry ID.
        user_action:
          type: string
          description: The user action, such as 'login', that you wish to associate with the telemetry ID.
    api_fraud_v1_NetworkProperties:
      type: object
      properties:
        ip_address:
          type: string
          description: The IP address of the client.
        asn:
          $ref: '#/components/schemas/api_fraud_v1_ASNProperties'
          description: Information about the network's ASN (Autonomous System Number).
        ip_geolocation:
          $ref: '#/components/schemas/api_fraud_v1_IPGeoProperties'
          description: Information about the geolocation of the user's IP address.
        is_proxy:
