            Locking Guide](https://stytch.com/docs/resources/platform/user-locks) for more information.
        roles:
          type: array
          items:
            type: string
          description: "Roles assigned to this User.\n   See the [RBAC guide](https://stytch.com/docs/guides/rbac/role-assignment)\
            \ for more information about role assignment."
        name:
          $ref: '#/components/schemas/api_user_v1_Name'
          description: The name of the User. Each field in the `name` object is optional.
        created_at:
          type: string
          description: The timestamp of the User's creation. Values conform to the RFC 3339 standard and are expressed in
            UTC, e.g. `2021-12-29T12:33:09Z`.
        password:
          $ref: '#/components/schemas/api_user_v1_Password'
          description: The password object is returned for users with a password.
        trusted_metadata:
          type: object
          additionalProperties: true
          description: The `trusted_metadata` field contains an arbitrary JSON object of application-specific data. See the
            [Metadata](https://stytch.com/docs/api/metadata) reference for complete field behavior details.
        untrusted_metadata:
          type: object
          additionalProperties: true
          description: The `untrusted_metadata` field contains an arbitrary JSON object of application-specific data. Untrusted
            metadata can be edited by end users directly via the SDK, and **cannot be used to store critical information.**
            See the [Metadata](https://stytch.com/docs/api/metadata) reference for complete field behavior details.
        external_id:
          type: string
          description: An identifier that can be used in most API calls where a `member_id` is expected. This is a string
            consisting of alphanumeric, `.`, `_`, `-`, or `|` characters with a maximum length of 128 characters. External
            IDs must be unique within the project.
        lock_created_at:
          type: string
          description: When the user lock was created, if there is one. Values conform to the RFC 3339 standard and are expressed
            in UTC, e.g. `2021-12-29T12:33:09Z`.
        lock_expires_at:
          type: string
          description: When the user lock expires, if there is one. Values conform to the RFC 3339 standard and are expressed
            in UTC, e.g. `2021-12-29T12:33:09Z`.
      required:
      - user_id
      - emails
      - status
      - phone_numbers
      - webauthn_registrations
      - providers
      - totps
      - crypto_wallets
      - biometric_registrations
      - is_locked
      - roles
    api_user_v1_UserConnectedApp:
      type: object
      properties:
        connected_app_id:
          type: string
          description: The ID of the Connected App.
        name:
          type: string
          description: The name of the Connected App.
        description:
          type: string
          description: A description of the Connected App.
        client_type:
          type: string
          description: The type of Connected App. Supported values are `first_party`, `first_party_public`, `third_party`,
            and `third_party_public`.
        scopes_granted:
          type: string
          description: The scopes granted to the Connected App at the completion of the last authorization flow.
        logo_url:
          type: string
          description: The logo URL of the Connected App, if any.
      required:
      - connected_app_id
      - name
      - description
      - client_type
      - scopes_granted
    api_user_v1_WebAuthnRegistration:
      type: object
      properties:
        webauthn_registration_id:
          type: string
          description: The unique ID for the Passkey or WebAuthn registration.
        domain:
          type: string
          description: The `domain` on which Passkey or WebAuthn registration was started. This will be the domain of your
            app.
        user_agent:
          type: string
          description: The user agent of the User.
        verified:
          type: boolean
          description: The verified boolean denotes whether or not this send method, e.g. phone number, email address, etc.,
            has been successfully authenticated by the User.
        authenticator_type:
          type: string
          description: The `authenticator_type` string displays the requested authenticator type of the Passkey or WebAuthn
            device. The two valid types are "platform" and "cross-platform". If no value is present, the Passkey or WebAuthn
            device was created without an authenticator type preference.
        name:
          type: string
          description: The `name` of the Passkey or WebAuthn registration.
      required:
      - webauthn_registration_id
      - domain
      - user_agent
      - verified
      - authenticator_type
      - name
    api_webauthn_v1_AuthenticateRequest:
      type: object
      properties:
        public_key_credential:
          type: string
          description: The response of the [navigator.credentials.create()](https://www.w3.org/TR/webauthn-2/#sctn-createCredential).
        session_token:
          type: string
          description: The `session_token` associated with a User's existing Session.
        session_duration_minutes:
          type: integer
          format: int32
          description: "Set the session lifetime to be this many minutes from now. This will start a new session if one doesn't\
            \ already exist,\n  returning both an opaque `session_token` and `session_jwt` for this session. Remember that\
            \ the `session_jwt` will have a fixed lifetime of\n  five minutes regardless of the underlying session duration,\
            \ and will need to be refreshed over time.\n\n  This value must be a minimum of 5 and a maximum of 527040 minutes\
            \ (366 days).\n\n  If a `session_token` or `session_jwt` is provided then a successful authentication will continue\
            \ to extend the session this many minutes.\n\n  If the `session_duration_minutes` parameter is not specified,\
            \ a Stytch session will not be created."
        session_jwt:
          type: string
          description: The `session_jwt` associated with a User's existing Session.
        session_custom_claims:
          type: object
          additionalProperties: true
          description: "Add a custom claims map to the Session being authenticated. Claims are only created if a Session is\
            \ initialized by providing a value in `session_duration_minutes`. Claims will be included on the Session object\
            \ and in the JWT. To update a key in an existing Session, supply a new value. To delete a key, supply a null value.\n\
            \n  Custom claims made with reserved claims (\"iss\", \"sub\", \"aud\", \"exp\", \"nbf\", \"iat\", \"jti\") will\
            \ be ignored. Total custom claims size cannot exceed four kilobytes."
        telemetry_id:
          type: string
          description: If the `telemetry_id` is passed, as part of this request, Stytch will call the [Fingerprint Lookup
            API](https://stytch.com/docs/fraud/api/fingerprint-lookup) and store the associated fingerprints and IPGEO information
            for the User. Your workspace must be enabled for Device Fingerprinting to use this feature.
      description: Request type
      required:
      - public_key_credential
    api_webauthn_v1_AuthenticateResponse:
      type: object
      properties:
        request_id:
          type: string
          description: Globally unique UUID that is returned with every API call. This value is important to log for debugging
            purposes; we may ask for this value to help identify a specific API call when helping you debug an issue.
        user_id:
          type: string
          description: The unique ID of the affected User.
        webauthn_registration_id:
          type: string
          description: The unique ID for the Passkey or WebAuthn registration.
        session_token:
          type: string
          description: A secret token for a given Stytch Session.
        session_jwt:
          type: string
          description: The JSON Web Token (JWT) for a given Stytch Session.
        user:
          $ref: '#/components/schemas/api_user_v1_User'
          description: The `user` object affected by this API call. See the [Get user endpoint](https://stytch.com/docs/api/get-user)
            for complete response field details.
        status_code:
          type: integer
          format: int32
          description: The HTTP status code of the response. Stytch follows standard HTTP response status code patterns, e.g.
            2XX values equate to success, 3XX values are redirects, 4XX are client errors, and 5XX are server errors.
        session:
          $ref: '#/components/schemas/api_session_v1_Session'
          description: "If you initiate a Session, by including `session_duration_minutes` in your authenticate call, you'll\
            \ receive a full Session object in the response.\n\n  See [Session object](https://stytch.com/docs/api/session-object)\
            \ for complete response fields.\n  "
        user_device:
          $ref: '#/components/schemas/api_device_history_v1_DeviceInfo'
          description: If a valid `telemetry_id` was passed in the request and the [Fingerprint Lookup API](https://stytch.com/docs/fraud/api/fingerprint-lookup)
            returned results, the `user_device` response field will contain information about the user's device attributes.
      required:
      - request_id
      - user_id
      - webauthn_registration_id
      - session_token
      - session_jwt
      - user
      - status_code
    api_webauthn_v1_AuthenticateStartRequest:
      type: object
      properties:
        domain:
          type: string
          description: The domain for Passkeys or WebAuthn. Defaults to `window.location.hostname`.
