          $ref: '#/components/schemas/api_session_v1_AuthenticationFactorDeliveryMethod'
          description: "The method that was used to deliver the authentication factor. The possible values depend on the `type`:\n\
            \     \n      `email_otp` \u2013 Only `email`.\n     \n      `impersonated` \u2013 Only `impersonation`.\n   \
            \   \n      `imported` \u2013 Only `imported_auth0`.\n     \n      `magic_link` \u2013 Only `email`.\n     \n\
            \      `oauth` \u2013 The delivery method is determined by the specific OAuth provider used. The possible values\
            \ are `oauth_google`, `oauth_microsoft`, `oauth_hubspot`, `oauth_slack`, or `oauth_github`.\n      \n        In\
            \ addition, you may see an 'exchange' delivery method when a non-email-verifying OAuth factor originally authenticated\
            \ in one organization is exchanged for a factor in another organization.\n        This can happen during authentication\
            \ flows such as [session exchange](https://stytch.com/docs/b2b/api/exchange-session).\n        The non-email-verifying\
            \ OAuth providers are Hubspot, Slack, and Github.\n        Google is also considered non-email-verifying when\
            \ the HD claim is empty.\n        The possible exchange values are `oauth_exchange_google`, `oauth_exchange_hubspot`,\
            \ `oauth_exchange_slack`, or `oauth_exchange_github`.\n       \n        The final possible value is `oauth_access_token_exchange`,\
            \ if this factor came from an [access token exchange flow](https://stytch.com/docs/b2b/api/connected-app-access-token-exchange).\n\
            \     \n      `otp` \u2013  Only `sms`.\n     \n      `password` \u2013 Only `knowledge`.\n     \n      `recovery_codes`\
            \ \u2013 Only `recovery_code`.\n     \n      `sso` \u2013 Either `sso_saml` or `sso_oidc`.\n     \n      `trusted_auth_token`\
            \ \u2013 Only `trusted_token_exchange`.\n     \n      `totp` \u2013 Only `authenticator_app`.\n      "
