      - url: openapi/stytch-consumer-openapi.yml
        type: OpenAPI
      - url: https://github.com/stytchauth/stytch-openapi
        type: OpenAPISource
    description: >-
      Stytch's Consumer API for end-user authentication. Covers Magic Links, SMS / email / WhatsApp OTP,
      OAuth social login, Passwords, TOTP, WebAuthn / Passkeys, Crypto Wallets, Sessions, Users, plus the
      M2M (client credentials) surface, Connected Apps (OAuth provider for third-party tools, AI agents,
      and MCP servers), Fraud / Device Fingerprinting, Impersonation, IDP introspection, and Consumer RBAC.
  - aid: stytch:stytch-b2b-api
    name: Stytch B2B Authentication API
    tags:
      - Authentication
      - B2B
      - SSO
      - SAML
      - OIDC
      - SCIM
      - Multi-Tenant
      - Organizations
      - RBAC
      - Connected Apps
    humanURL: https://stytch.com/docs/b2b
    baseURL: https://api.stytch.com/v1/b2b
    properties:
      - url: https://stytch.com/docs/b2b
        type: Documentation
      - url: https://stytch.com/docs/b2b/api/overview
        type: APIReference
      - url: openapi/stytch-b2b-openapi.yml
        type: OpenAPI
      - url: https://github.com/stytchauth/stytch-openapi
        type: OpenAPISource
    description: >-
      Stytch's B2B API for multi-tenant SaaS authentication. Covers Organizations, Members, SSO (SAML and
      OIDC), Magic Links, OTP, OAuth, Discovery, Sessions, B2B RBAC, SCIM directory sync, TOTP, Recovery
      Codes, Passwords, Impersonation, and the B2B IDP surface used by Connected Apps.
  - aid: stytch:stytch-management-api
    name: Stytch Management API
    tags:
