specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Stytch
providerId: stytch
created: '2026-05-04'
modified: '2026-05-22'
reconciled: true
tags:
  - Rate Limiting
  - Identity
description: Stytch API rate limits per project.
sources:
  - https://stytch.com/pricing
  - https://stytch.com/docs/api/rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Default API
    scope: project
    metric: requests_per_second
    limit: 100
    timeFrame: second
  - name: Auth endpoints
    scope: project
    metric: requests_per_second
    limit: 100
    timeFrame: second
  - name: M2M token
    scope: client
    metric: tokens_per_minute
    limit: varies by tier
