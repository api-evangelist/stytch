          type: string
          description: The unique identifier for the User within a given OAuth provider. Also commonly called the "sub" or
            "Subject field" in OAuth protocols.
        provider_type:
          type: string
          description: Denotes the OAuth identity provider that the user has authenticated with, e.g. Google, Facebook, GitHub
            etc.
        session_token:
          type: string
          description: A secret token for a given Stytch Session.
        session_jwt:
          type: string
          description: The JSON Web Token (JWT) for a given Stytch Session.
        provider_values:
          $ref: '#/components/schemas/api_oauth_v1_ProviderValues'
          description: "The `provider_values` object lists relevant identifiers, values, and scopes for a given OAuth provider.\
            \ For example this object will include a provider's `access_token` that you can use to access the provider's API\
            \ for a given user.\n\n  Note that these values will vary based on the OAuth provider in question, e.g. `id_token`\
            \ is only returned by OIDC compliant identity providers."
        user:
          $ref: '#/components/schemas/api_user_v1_User'
          description: The `user` object affected by this API call. See the [Get user endpoint](https://stytch.com/docs/api/get-user)
            for complete response field details.
        reset_sessions:
          type: boolean
          description: Indicates if all other of the User's Sessions need to be reset. You should check this field if you
            aren't using Stytch's Session product. If you are using Stytch's Session product, we revoke the User's other sessions
