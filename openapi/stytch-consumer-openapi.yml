  /v1/users/search:
    post:
      summary: Search
      operationId: api_user_v1_Search
      tags:
      - User
      description: '

        **Warning**: This endpoint is not recommended for use in login flows. Scaling issues may occur, as search performance
        may vary from ~150 milliseconds to 9 seconds depending on query complexity and rate limits are set to 150 requests/minute.


        Search for Users within your Stytch Project.


        Use the `query` object to filter by different fields. See the `query.operands.filter_value` documentation below for
        a list of available filters.


        ### Export all User data


        Submit an empty `query` in your Search Users request to return all of your Stytch Project''s Users.


        [This Github repository](https://github.com/stytchauth/stytch-node-export-users) contains a utility that leverages
        the Search Users endpoint to export all of your User data to a CSV or JSON file.'
