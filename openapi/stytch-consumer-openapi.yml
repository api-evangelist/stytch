        a message containing the returned `challenge` field.


        For Ethereum crypto wallets, you can optionally use the Sign In With Ethereum (SIWE) protocol for the message by passing
        in the `siwe_params`. The only required fields are `domain` and `uri`.

        If the crypto wallet detects that the domain in the message does not match the website''s domain, it will display
        a warning to the user.


