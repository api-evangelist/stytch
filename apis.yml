apis:
  - aid: stytch:stytch-consumer-api
    name: Stytch Consumer Authentication API
    tags:
      - Authentication
      - Passwordless
      - Magic Links
      - OTP
      - Consumer
    humanURL: https://stytch.com/docs/api
    properties:
      - url: https://stytch.com/docs/api
        type: Documentation
      - url: https://stytch.com/docs/api/reference/library/overview
        type: API Reference
      - url: openapi/stytch-consumer-openapi.yml
        type: OpenAPI
    description: Stytch's Consumer API provides passwordless and password-based authentication for consumer-facing
      applications. Supports magic links, SMS/email OTP, OAuth social login, TOTP (authenticator apps),
      WebAuthn (biometrics/passkeys), and session management.
  - aid: stytch:stytch-b2b-api
    name: Stytch B2B Authentication API
    tags:
      - Authentication
      - B2B
      - SSO
      - Multi-Tenant
      - Organizations
    humanURL: https://stytch.com/docs/b2b
    properties:
      - url: https://stytch.com/docs/b2b
        type: Documentation
      - url: https://stytch.com/docs/b2b/api/overview
        type: API Reference
      - url: openapi/stytch-b2b-openapi.yml
        type: OpenAPI
    description: Stytch's B2B API provides authentication and identity management for organization-based
      SaaS applications. Supports multi-tenancy with Organizations and Members, SSO via SAML and OIDC,
      magic links, OTP, OAuth, and organization discovery flows.
