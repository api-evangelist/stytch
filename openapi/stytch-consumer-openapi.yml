          type: boolean
          description: "Flag for whether or not to save a user as pending vs active in Stytch. Defaults to false.\n      \
            \  If true, users will be saved with status pending in Stytch's backend until authenticated.\n        If false,\
            \ users will be created as active. An example usage of\n        a true flag would be to require users to verify\
            \ their phone by entering the OTP code before creating\n        an account for them."
        trusted_metadata:
