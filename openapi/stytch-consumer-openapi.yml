        phone_number:
          type: string
          description: The phone number to use for one-time passcodes. The phone number should be in E.164 format (i.e. +1XXXXXXXXXX).
            You may use +10000000000 to test this endpoint, see [Testing](https://stytch.com/docs/home#resources_testing)
            for more detail.
