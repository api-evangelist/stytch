      - ALLOW
      - CHALLENGE
      - BLOCK
      - NONE
    api_fraud_v1_Properties:
      type: object
      properties:
        network_properties:
          $ref: '#/components/schemas/api_fraud_v1_NetworkProperties'
        browser_properties:
          $ref: '#/components/schemas/api_fraud_v1_BrowserProperties'
      required:
      - network_properties
      - browser_properties
    api_fraud_v1_RiskResponseAction:
      type: string
      enum:
      - ALLOW
      - CHALLENGE
      - BLOCK
    api_fraud_v1_Rule:
      type: object
      properties:
        rule_type:
          $ref: '#/components/schemas/api_fraud_v1_RuleType'
          description: The rule type. The possible values are `VISITOR_ID`, `BROWSER_ID`, `VISITOR_FINGERPRINT`, `BROWSER_FINGERPRINT`,
            `HARDWARE_FINGERPRINT`, `NETWORK_FINGERPRINT`, `CIDR_BLOCK`, `ASN`, or `COUNTRY_CODE`.
        action:
          $ref: '#/components/schemas/api_fraud_v1_RuleAction'
          description: The action (`ALLOW`, `BLOCK`, or `CHALLENGE`) that will be returned for this rule.
        created_at:
          type: string
          description: The time when the rule was created. Values conform to the RFC 3339 standard and are expressed in UTC,
            e.g. `2021-12-29T12:33:09Z`.
        visitor_id:
          type: string
          description: The visitor ID that a rule was set for.
        browser_id:
          type: string
          description: The browser ID that a rule was set for.
        visitor_fingerprint:
          type: string
          description: The visitor fingerprint that a rule was set for.
        browser_fingerprint:
          type: string
          description: The browser fingerprint that a rule was set for.
        hardware_fingerprint:
          type: string
          description: The hardware fingerprint that a rule was set for.
        network_fingerprint:
          type: string
          description: The network fingerprint that a rule was set for.
        cidr_block:
          type: string
          description: The CIDR block that a rule was set for. If an end user's IP address is within this CIDR block, this
            rule will be applied.
        country_code:
          type: string
          description: The country code that a rule was set for.
        asn:
          type: string
          description: The ASN that a rule was set for.
        description:
          type: string
          description: A description for the rule.
        expires_at:
          type: string
          description: The timestamp when the rule expires. Values conform to the RFC 3339 standard and are expressed in UTC,
            e.g. `2021-12-29T12:33:09Z`.
        last_updated_at:
          type: string
          description: The time when the rule was last updated. Will be null if the rule has never been updated. Values conform
            to the RFC 3339 standard and are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
      required:
      - rule_type
      - action
      - created_at
    api_fraud_v1_RuleAction:
      type: string
      enum:
      - ALLOW
      - CHALLENGE
      - BLOCK
      - NONE
    api_fraud_v1_RuleType:
      type: string
      enum:
      - VISITOR_ID
      - BROWSER_ID
      - VISITOR_FINGERPRINT
      - BROWSER_FINGERPRINT
      - HARDWARE_FINGERPRINT
      - NETWORK_FINGERPRINT
      - CIDR_BLOCK
      - ASN
      - COUNTRY_CODE
    api_fraud_v1_Verdict:
      type: object
      properties:
        action:
          $ref: '#/components/schemas/api_fraud_v1_VerdictAction'
          description: "The suggested action based on the fingerprint review. The available actions are:\n  * `ALLOW` - This\
            \ is a known valid device grouping or device profile that is part of the default ALLOW listed set of known devices\
            \ by Stytch. This grouping is made up of verified device profiles that match the characteristics of known/authentic\
            \ traffic origins\n  * `BLOCK` - This is a known bad or malicious device profile that is undesirable and should\
            \ be blocked from completing the privileged action in question\n  * `CHALLENGE` - This is an unknown or potentially\
            \ malicious device that should be put through increased friction such as 2FA or other forms of extended user verification\
            \ before allowing the privileged action to proceed\n  "
        reasons:
          type: array
          items:
            type: string
          description: A set of contextual clues to inform why a `CHALLENGE` or `BLOCK` action was suggested. For a list of
            possible Reasons, see [Warning Flags (Verdict Reasons)](https://stytch.com/docs/docs/fraud/guides/device-fingerprinting/reference/warning-flags-verdict-reasons).
        detected_device_type:
          type: string
          description: The operating system and architecture that took the fingerprint.
        is_authentic_device:
          type: boolean
          description: The assessment of whether this is an authentic device. It will be false if hardware or browser deception
            is detected.
        verdict_reason_overrides:
          type: array
          items:
            $ref: '#/components/schemas/api_fraud_v1_VerdictReasonOverride'
          description: A list of verdict reason overrides that were applied, if any.
        rule_match_type:
          $ref: '#/components/schemas/api_fraud_v1_RuleType'
          description: The type of rule match that was applied (e.g. `VISITOR_ID`), if any. This field will only be present
            if there is a `RULE_MATCH` reason in the list of verdict reasons.
        rule_match_identifier:
          type: string
          description: The rule that was applied (e.g. a specific visitor ID value), if any. This field will only be present
            if there is a `RULE_MATCH` reason in the list of verdict reasons.
      required:
      - action
      - reasons
      - detected_device_type
      - is_authentic_device
      - verdict_reason_overrides
    api_fraud_v1_VerdictAction:
      type: string
      enum:
      - ALLOW
      - CHALLENGE
      - BLOCK
    api_fraud_v1_VerdictReasonAction:
      type: object
      properties:
        verdict_reason:
          type: string
          description: The verdict reason.
        default_action:
          $ref: '#/components/schemas/api_fraud_v1_VerdictReasonActionAction'
          description: The default action returned for the specified verdict reason in a fingerprint lookup when no overrides
            are specified.
        override_action:
          $ref: '#/components/schemas/api_fraud_v1_VerdictReasonActionAction'
          description: If not null, this action will be returned for the specified verdict reason in a fingerprint lookup,
            in place of the default action.
        override_created_at:
          type: string
          description: The time when the override was created, if one exists. Values conform to the RFC 3339 standard and
            are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
        override_description:
          type: string
          description: A description of the override, if one exists.
      required:
      - verdict_reason
      - default_action
    api_fraud_v1_VerdictReasonActionAction:
      type: string
      enum:
      - ALLOW
      - CHALLENGE
      - BLOCK
    api_fraud_v1_VerdictReasonOverride:
      type: object
      properties:
        verdict_reason:
          type: string
          description: The verdict reason that was overridden.
        override_action:
          $ref: '#/components/schemas/api_fraud_v1_VerdictReasonOverrideAction'
          description: The action that was applied for the given verdict reason.
      required:
      - verdict_reason
      - override_action
    api_fraud_v1_VerdictReasonOverrideAction:
      type: string
      enum:
      - ALLOW
      - CHALLENGE
      - BLOCK
    api_fraud_v1_fraud_email_RiskRequest:
      type: object
      properties:
        email_address:
          type: string
          description: The email address to check.
      description: Request type
      required:
      - email_address
    api_fraud_v1_fraud_email_RiskResponse:
      type: object
      properties:
        request_id:
          type: string
          description: Globally unique UUID that is returned with every API call. This value is important to log for debugging
            purposes; we may ask for this value to help identify a specific API call when helping you debug an issue.
        address_information:
          $ref: '#/components/schemas/api_fraud_v1_AddressInformation'
          description: Information about the email address.
        domain_information:
          $ref: '#/components/schemas/api_fraud_v1_DomainInformation'
          description: Information about the email domain.
        action:
          $ref: '#/components/schemas/api_fraud_v1_RiskResponseAction'
          description: "The suggested action based on the attributes of the email address. The available actions are:\n  *\
            \ `ALLOW` - This email is most likely safe to send to and not fraudulent.\n  * `BLOCK` - This email is invalid\
            \ or exhibits signs of fraud. We recommend blocking the end user.\n  * `CHALLENGE` - This email has some potentially\
            \ fraudulent attributes. We recommend increased friction such as 2FA or other forms of extended user verification\
            \ before allowing the privileged action to proceed.\n  "
        risk_score:
          type: integer
          format: int32
          description: A score from 0 to 100 indicating how risky the email is. 100 is the most risky.
        status_code:
          type: integer
          format: int32
          description: The HTTP status code of the response. Stytch follows standard HTTP response status code patterns, e.g.
            2XX values equate to success, 3XX values are redirects, 4XX are client errors, and 5XX are server errors.
      required:
      - request_id
      - address_information
      - domain_information
      - action
      - risk_score
      - status_code
    api_fraud_v1_fraud_fingerprint_LookupRequest:
      type: object
      properties:
        telemetry_id:
          type: string
          description: The telemetry ID associated with the fingerprint getting looked up.
        external_metadata:
          $ref: '#/components/schemas/api_fraud_v1_Metadata'
          description: External identifiers that you wish to associate with the given telemetry ID. You will be able to search
            for fingerprint results by these identifiers in the DFP analytics dashboard. External metadata fields may not
            exceed 65 characters. They may only contain alphanumerics and the characters `_` `-` `+` `.` or `@`.
      description: Request type
      required:
      - telemetry_id
    api_fraud_v1_fraud_fingerprint_LookupResponse:
      type: object
      properties:
        request_id:
          type: string
          description: Globally unique UUID that is returned with every API call. This value is important to log for debugging
            purposes; we may ask for this value to help identify a specific API call when helping you debug an issue.
        telemetry_id:
          type: string
          description: The telemetry ID associated with the fingerprint getting looked up.
        fingerprints:
          $ref: '#/components/schemas/api_fraud_v1_Fingerprints'
          description: 'A Stytch fingerprint consists of the following identifiers:'
        verdict:
          $ref: '#/components/schemas/api_fraud_v1_Verdict'
          description: The metadata associated with each fingerprint
        external_metadata:
          $ref: '#/components/schemas/api_fraud_v1_Metadata'
          description: External identifiers that you wish to associate with the given telemetry ID. You will be able to search
            for fingerprint results by these identifiers in the DFP analytics dashboard. External metadata fields may not
            exceed 65 characters. They may only contain alphanumerics and the characters `_` `-` `+` `.` or `@`.
        created_at:
          type: string
          description: The time when the fingerprint was taken. Values conform to the RFC 3339 standard and are expressed
            in UTC, e.g. `2021-12-29T12:33:09Z`.
        expires_at:
          type: string
          description: The timestamp when the fingerprint expires. Values conform to the RFC 3339 standard and are expressed
            in UTC, e.g. `2021-12-29T12:33:09Z`.
        status_code:
          type: integer
          format: int32
          description: The HTTP status code of the response. Stytch follows standard HTTP response status code patterns, e.g.
            2XX values equate to success, 3XX values are redirects, 4XX are client errors, and 5XX are server errors.
        properties:
          $ref: '#/components/schemas/api_fraud_v1_Properties'
          description: Additional information about the user's browser and network.
        raw_signals:
          type: object
          additionalProperties: true
          description: The raw device attributes, such as screen size, that were collected by the Device Fingerprinting product
            to generate the fingerprints and verdict. You must be specifically enabled for the raw signals feature to see
            this field. You can find documentation for the specific fields in the [guides](https://stytch.com/docs/fraud/guides/device-fingerprinting/reference/raw-signals).
      required:
      - request_id
      - telemetry_id
      - fingerprints
      - verdict
      - external_metadata
      - created_at
      - expires_at
      - status_code
    api_fraud_v1_fraud_rules_ListRequest:
      type: object
      properties:
        cursor:
          type: string
          description: The `cursor` field allows you to paginate through your results. Each result array is limited to 100
            results. If your query returns more than 100 results, you will need to paginate the responses using the `cursor`.
            If you receive a response that includes a non-null `next_cursor`, repeat the request with the `next_cursor` value
            set to the `cursor` field to retrieve the next page of results. Continue to make requests until the `next_cursor`
            in the response is null.
        limit:
          type: integer
          format: int32
          description: The number of results to return per page. The default limit is 10. A maximum of 100 results can be
            returned by a single get request. If the total size of your result set is greater than one page size, you must
            paginate the response. See the `cursor` field.
      description: Request type
    api_fraud_v1_fraud_rules_ListResponse:
      type: object
      properties:
        request_id:
          type: string
          description: Globally unique UUID that is returned with every API call. This value is important to log for debugging
            purposes; we may ask for this value to help identify a specific API call when helping you debug an issue.
        next_cursor:
          type: string
          description: The `next_cursor` string is returned when your result contains more than one page of results. This
            value is passed into your next request in the `cursor` field.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/api_fraud_v1_Rule'
          description: A list of rules for the project
        status_code:
          type: integer
          format: int32
          description: The HTTP status code of the response. Stytch follows standard HTTP response status code patterns, e.g.
            2XX values equate to success, 3XX values are redirects, 4XX are client errors, and 5XX are server errors.
      required:
      - request_id
      - next_cursor
      - rules
      - status_code
    api_fraud_v1_fraud_rules_SetRequest:
      type: object
      properties:
        action:
          $ref: '#/components/schemas/api_fraud_v1_RuleAction'
          description: 'The action that should be returned by a fingerprint lookup for that identifier with a `RULE_MATCH`
            reason. The following values are valid: `ALLOW`, `BLOCK`, `CHALLENGE`, or `NONE`. For country codes, `ALLOW` actions
            are not allowed. If a `NONE` action is specified, it will clear the stored rule.'
        visitor_id:
          type: string
          description: The visitor ID we want to set a rule for. Only one identifier can be specified in the request.
        browser_id:
          type: string
          description: The browser ID we want to set a rule for. Only one identifier can be specified in the request.
        visitor_fingerprint:
          type: string
          description: The visitor fingerprint we want to set a rule for. Only one identifier can be specified in the request.
        browser_fingerprint:
          type: string
          description: The browser fingerprint we want to set a rule for. Only one identifier can be specified in the request.
        hardware_fingerprint:
          type: string
          description: The hardware fingerprint we want to set a rule for. Only one identifier can be specified in the request.
        network_fingerprint:
          type: string
          description: The network fingerprint we want to set a rule for. Only one identifier can be specified in the request.
        expires_in_minutes:
          type: integer
          format: int32
          description: The number of minutes until this rule expires. If no `expires_in_minutes` is specified, then the rule
            is kept permanently.
        description:
          type: string
          description: An optional description for the rule.
