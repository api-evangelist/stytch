position: Consuming
description: >-
  Stytch is an authentication and identity infrastructure provider. Its Consumer and B2B APIs cover
  passwordless authentication (Magic Links, OTP, OAuth, WebAuthn / Passkeys, TOTP), enterprise SSO
  (SAML / OIDC) and SCIM, sessions, M2M client-credentials tokens, and Device Fingerprinting / fraud
  defense. Connected Apps lets a Stytch-secured product act as an OAuth 2.0 / OIDC Authorization
  Server for third-party integrations, desktop apps, AI agents, and MCP servers — a posture Stytch
  describes as "agent-ready". A separate Management API plus a Terraform provider handle workspace
  configuration as code.
