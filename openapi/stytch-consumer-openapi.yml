            \ `userVerification` set to `\"preferred\"`.\n      "
        use_base64_url_encoding:
          type: boolean
          description: If true, values in the `public_key_credential_creation_options` will be base64 URL encoded. Set this
            option to true when using built-in browser methods like `navigator.credentials.create` and `navigator.credentials.get`.
      description: Request type
