        user_session:
          $ref: '#/components/schemas/api_session_v1_Session'
          description: "A `Session` object. For backwards compatibility reasons, the session from an OAuth authenticate call\
            \ is labeled as `user_session`, but is otherwise just a standard stytch `Session` object.\n\n  See [Session object](https://stytch.com/docs/api/session-object)\
            \ for complete response fields.\n  "
        user_device:
          $ref: '#/components/schemas/api_device_history_v1_DeviceInfo'
          description: If a valid `telemetry_id` was passed in the request and the [Fingerprint Lookup API](https://stytch.com/docs/fraud/api/fingerprint-lookup)
