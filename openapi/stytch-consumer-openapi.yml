        \ IP address and user agent matching the initial reset request.\n\nThe provided password needs to meet our password\
        \ strength requirements, which can be checked in advance with the password strength endpoint. If the token and password\
        \ are accepted, the password is securely stored for future authentication and the user is authenticated.\n\nNote that\
        \ a successful password reset by email will revoke all active sessions for the `user_id`."
