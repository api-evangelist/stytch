        type: TerraformProvider
      - url: https://github.com/stytchauth/stytch-management-node
        type: SDK
      - url: https://github.com/stytchauth/stytch-management-go
        type: SDK
      - url: https://github.com/stytchauth/stytch-management-python
        type: SDK
    description: >-
      Stytch's Workspace Management API (management.stytch.com) for programmatic configuration —
      projects, environments, secrets, redirect URLs, allowed country codes, RBAC policies, email
      templates, JWT templates, event log streaming, public tokens, trusted token profiles, and
      Consumer / B2B SDK configuration. Backs the Terraform provider and the language-specific
      management SDKs.
