  /v1/idp/oauth/authorize:
    post:
      summary: Authorize
      operationId: api_idp_v1_idp_oauth_Authorize
      tags:
      - IDP
      description: "Completes a request for authorization of a Connected App to access a User's account.\n\nCall this endpoint\
        \ using the query parameters from an OAuth Authorization request, after previously validating those parameters using\
        \ the\n[Preflight Check](https://stytch.com/docs/api/connected-apps-oauth-authorize-start) API.\nNote that this endpoint\
        \ takes in a few additional parameters the preflight check does not- `state`, `nonce`, and `code_challenge`.\n\nIf\
        \ the authorization was successful, the `redirect_uri` will contain a valid `authorization_code` embedded as a query\
        \ parameter.\nIf the authorization was unsuccessful, the `redirect_uri` will contain an OAuth2.1 `error_code`.\nIn\
        \ both cases, redirect the user to the location for the response to be consumed by the Connected App. \n\nExactly\
        \ one of the following must be provided to identify the user granting authorization:\n- `user_id`\n- `session_token`\n\
        - `session_jwt`\n\nIf a `session_token` or `session_jwt` is passed, the OAuth Authorization will be linked to the\
        \ user's session for tracking purposes.\nOne of these fields must be used if the Connected App intends to complete\
        \ the [Exchange Access Token](https://stytch.com/docs/api/connected-app-access-token-exchange) flow."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api_idp_v1_idp_oauth_AuthorizeRequest'
      responses:
        '200':
