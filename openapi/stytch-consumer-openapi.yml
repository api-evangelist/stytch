  /v1/magic_links/email/send:
    post:
      summary: Send
      operationId: api_magic_v1_magic_links_email_Send
      tags:
      - Magic Links
      description: 'Send a magic link to an existing Stytch user using their email address. If you''d like to create a user
        and send them a magic link by email with one request, use our [log in or create endpoint](https://stytch.com/docs/api/log-in-or-create-user-by-email).


        ### Add an email to an existing user

        This endpoint also allows you to add a new email address to an existing Stytch User. Including a `user_id`, `session_token`,
        or `session_jwt` in your Send Magic Link by email request will add the new, unverified email address to the existing
        Stytch User. If the user successfully authenticates within 5 minutes, the new email address will be marked as verified
        and remain permanently on the existing Stytch User. Otherwise, it will be removed from the User object, and any subsequent
        login requests using that email address will create a new User.


        ### Next steps

        The user is emailed a magic link which redirects them to the provided [redirect URL](https://stytch.com/docs/guides/magic-links/email-magic-links/redirect-routing).
        Collect the `token` from the URL query parameters, and call [Authenticate magic link](https://stytch.com/docs/api/authenticate-magic-link)
        to complete authentication.'
