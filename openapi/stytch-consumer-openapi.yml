          type: integer
          format: int32
          description: For LUDS validation, the number of complexity requirements that are missing from the password. Check
            the complexity fields to see which requirements are missing.
        missing_characters:
          type: integer
          format: int32
          description: For LUDS validation, this is the required length of the password that you've set minus the length of
