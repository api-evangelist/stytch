  /v1/passwords/strength_check:
    post:
      summary: Strengthcheck
      operationId: api_password_v1_StrengthCheck
      tags:
      - Password
      description: "This API allows you to check whether or not the user\u2019s provided password is valid, and to provide\
        \ feedback to the user on how to increase the strength of their password.\n\nThis endpoint adapts to your Project's\
        \ password strength configuration. If you're using [zxcvbn](https://stytch.com/docs/guides/passwords/strength-policy),\
        \ the default, your passwords are considered valid if the strength score is >= 3. If you're using [LUDS](https://stytch.com/docs/guides/passwords/strength-policy),\
        \ your passwords are considered valid if they meet the requirements that you've set with Stytch. You may update your\
        \ password strength configuration in the [Stytch Dashboard](https://stytch.com/dashboard/password-strength-config).\n\
        \n\n### Password feedback\n\nThe `feedback` object contains relevant fields for you to relay feedback to users that\
        \ failed to create a strong enough password.\n\nIf you're using zxcvbn, the `feedback` object will contain `warning`\
        \ and `suggestions` for any password that does not meet the zxcvbn strength requirements. You can return these strings\
        \ directly to the user to help them craft a strong password.\n\nIf you're using LUDS, the `feedback` object will contain\
        \ an object named `luds_requirements` which contain a collection of fields that the user failed or passed. You'll\
        \ want to prompt the user to create a password that meets all of the requirements that they failed."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api_password_v1_StrengthCheckRequest'
