      - user_id
      - challenge
      - user_created
      - status_code
    api_crypto_wallet_v1_SIWEParams:
      type: object
      properties:
        domain:
          type: string
          description: Only required if `siwe_params` is passed. The domain that is requesting the crypto wallet signature.
            Must be an RFC 3986 authority.
        uri:
          type: string
          description: Only required if `siwe_params` is passed. An RFC 3986 URI referring to the resource that is the subject
            of the signing.
        resources:
          type: array
          items:
            type: string
          description: ' A list of information or references to information the user wishes to have resolved as part of authentication.
            Every resource must be an RFC 3986 URI.'
        chain_id:
          type: string
          description: The EIP-155 Chain ID to which the session is bound. Defaults to 1. Must be the string representation
            of an integer between 1 and 9,223,372,036,854,775,771, inclusive.
        statement:
          type: string
          description: A human-readable ASCII assertion that the user will sign. The statement may only include reserved,
            unreserved, or space characters according to RFC 3986 definitions, and must not contain other forms of whitespace
            such as newlines, tabs, and carriage returns.
        issued_at:
          type: string
          description: The time when the message was generated. Defaults to the current time. All timestamps in our API conform
            to the RFC 3339 standard and are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
        not_before:
          type: string
          description: The time when the signed authentication message will become valid. Defaults to the current time. All
            timestamps in our API conform to the RFC 3339 standard and are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
        message_request_id:
          type: string
          description: A system-specific identifier that may be used to uniquely refer to the sign-in request. The `message_request_id`
            must be a valid pchar according to RFC 3986 definitions.
      required:
      - domain
      - uri
      - resources
    api_crypto_wallet_v1_SIWEParamsResponse:
      type: object
      properties:
        domain:
          type: string
          description: The domain that requested the crypto wallet signature.
        uri:
          type: string
          description: An RFC 3986 URI referring to the resource that is the subject of the signing.
        chain_id:
          type: string
          description: The EIP-155 Chain ID to which the session is bound.
        resources:
          type: array
          items:
            type: string
          description: ' A list of information or references to information the user wishes to have resolved as part of authentication.
            Every resource must be an RFC 3986 URI.'
        status_code:
          type: integer
          format: int32
        issued_at:
          type: string
          description: The time when the message was generated. All timestamps in our API conform to the RFC 3339 standard
            and are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
        message_request_id:
          type: string
          description: A system-specific identifier that may be used to uniquely refer to the sign-in request.
      required:
      - domain
      - uri
      - chain_id
      - resources
      - status_code
    api_debug_v1_WhoamiResponse:
      type: object
      properties:
        request_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        status_code:
          type: integer
          format: int32
      required:
      - request_id
      - project_id
      - name
      - status_code
    api_device_history_v1_DeviceAttributeDetails:
      type: object
      properties:
        is_new:
          type: boolean
          description: Whether this `ip_geo_country` has been seen before for this user.
        first_seen_at:
          type: string
          description: When this `ip_geo_country` was first seen for this user. Values conform to the RFC 3339 standard and
            are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
        last_seen_at:
          type: string
          description: When this `ip_geo_country` was last seen for this user. Values conform to the RFC 3339 standard and
            are expressed in UTC, e.g. `2021-12-29T12:33:09Z`.
      required:
      - is_new
    api_device_history_v1_DeviceInfo:
      type: object
      properties:
        visitor_id:
          type: string
          description: The `visitor_id` (a unique identifier) of the user's device. See the [Device Fingerprinting documentation](https://stytch.com/docs/fraud/guides/device-fingerprinting/fingerprints)
            for more details on the `visitor_id`.
        visitor_id_details:
          $ref: '#/components/schemas/api_device_history_v1_DeviceAttributeDetails'
          description: Information about the `visitor_id`.
        ip_address:
          type: string
          description: The IP address of the user's device.
        ip_address_details:
          $ref: '#/components/schemas/api_device_history_v1_DeviceAttributeDetails'
          description: Information about the `ip_address`.
        ip_geo_city:
          type: string
          description: The city where the IP address is located.
        ip_geo_region:
          type: string
          description: The region where the IP address is located.
        ip_geo_country:
          type: string
          description: The country code where the IP address is located.
        ip_geo_country_details:
          $ref: '#/components/schemas/api_device_history_v1_DeviceAttributeDetails'
          description: Information about the `ip_geo_country`.
      required:
      - visitor_id
    api_fraud_v1_ASNProperties:
      type: object
      properties:
        asn:
          type: string
          description: The Autonomous System Number of the user's network.
        name:
          type: string
          description: Public name associated with the ASN.
        network:
          type: string
          description: The CIDR block associated with the ASN.
      required:
      - asn
      - name
      - network
    api_fraud_v1_AddressInformation:
      type: object
      properties:
        has_known_bounces:
          type: boolean
          description: Whether email sent to this address is known to have bounced previously.
        has_valid_syntax:
          type: boolean
          description: Whether this email address is valid.
        is_suspected_role_address:
          type: boolean
          description: Whether the local part of the email appears to be a role or group, rather than an individual end user.
        normalized_email:
          type: string
          description: The normalized email address after removing '.' characters and any characters after a '+'.
        tumbling_character_count:
          type: integer
          format: int32
          description: The number of '.' and '+' characters in the email address. A higher tumbling count indicates a higher
            potential for fraud.
      required:
      - has_known_bounces
      - has_valid_syntax
      - is_suspected_role_address
      - normalized_email
      - tumbling_character_count
    api_fraud_v1_BrowserProperties:
      type: object
      properties:
        user_agent:
          type: string
