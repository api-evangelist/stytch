        name: conns_free
        type: quota
        metric: connection
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: M2M tokens included
        name: m2m_free
        type: quota
        metric: token
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
