naftiko: "1.0.0-alpha1"

info:
  label: "Stytch Consumer Authentication API"
  description: >-
    Stytch Consumer API for passwordless and password-based authentication. Supports magic links,
    OTP (SMS/email), OAuth, TOTP, WebAuthn, and session management for consumer applications.
  tags:
    - Stytch
    - Authentication
    - Consumer
    - Passwordless
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STYTCH_PROJECT_ID: STYTCH_PROJECT_ID
      STYTCH_SECRET: STYTCH_SECRET

capability:
  consumes:
    - type: http
      namespace: stytch-consumer
      baseUri: https://api.stytch.com/v1
      description: "Stytch Consumer Authentication API."
      authentication:
        type: basic
        username: "{{STYTCH_PROJECT_ID}}"
        password: "{{STYTCH_SECRET}}"
      resources:
        - name: magic-link-send
          path: /magic_links/email/send
          description: "Send authentication magic links"
          operations:
            - name: send-magic-link
              method: POST
              description: "Send a magic link email to authenticate a user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"

        - name: magic-link-authenticate
          path: /magic_links/authenticate
          description: "Authenticate magic link tokens"
          operations:
            - name: authenticate-magic-link
              method: POST
              description: "Authenticate a user with a magic link token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  token: "{{tools.token}}"
                  session_duration_minutes: "{{tools.session_duration_minutes}}"

        - name: otp-sms-send
          path: /otps/sms/send
          description: "Send SMS OTP"
          operations:
            - name: send-otp-sms
              method: POST
              description: "Send a one-time passcode via SMS"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  phone_number: "{{tools.phone_number}}"

        - name: otp-authenticate
          path: /otps/authenticate
          description: "Authenticate OTP codes"
          operations:
            - name: authenticate-otp
              method: POST
              description: "Authenticate a user with an OTP code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  method_id: "{{tools.method_id}}"
                  code: "{{tools.code}}"
                  session_duration_minutes: "{{tools.session_duration_minutes}}"

        - name: sessions
          path: /sessions
          description: "Session listing"
          operations:
            - name: get-sessions
              method: GET
              description: "Get all sessions for a user"
              inputParameters:
                - name: user_id
                  in: query
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: session-authenticate
          path: /sessions/authenticate
          description: "Session authentication"
          operations:
            - name: authenticate-session
              method: POST
              description: "Validate and authenticate a session"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  session_token: "{{tools.session_token}}"
                  session_jwt: "{{tools.session_jwt}}"

        - name: session-revoke
          path: /sessions/revoke
          description: "Session revocation"
          operations:
            - name: revoke-session
              method: POST
              description: "Revoke an active session"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: "User management"
          operations:
            - name: search-users
              method: GET
              description: "Search user records"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: user
          path: /users/{user_id}
          description: "Individual user operations"
          operations:
            - name: get-user
              method: GET
              description: "Get a user by ID"
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-user
              method: DELETE
              description: "Delete a user"
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stytch-consumer-rest
      resources:
        - path: /v1/magic-links/send
          name: magic-link-send
          operations:
            - method: POST
              name: send-magic-link
              description: "Send a magic link"
              call: "stytch-consumer.send-magic-link"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sessions/{user_id}
          name: user-sessions
          operations:
            - method: GET
              name: get-sessions
              description: "Get user sessions"
              call: "stytch-consumer.get-sessions"
              with:
                user_id: "rest.user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{user_id}
          name: user
          operations:
            - method: GET
              name: get-user
              description: "Get a user"
              call: "stytch-consumer.get-user"
              with:
                user_id: "rest.user_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stytch-consumer-mcp
      transport: http
      tools:
        - name: send-magic-link
          description: "Send a Stytch magic link to authenticate a consumer user"
          hints:
            readOnly: false
            destructive: false
          call: "stytch-consumer.send-magic-link"
          outputParameters:
            - type: object
              mapping: "$."
        - name: authenticate-magic-link
          description: "Authenticate a consumer user using a magic link token"
          hints:
            readOnly: false
            destructive: false
          call: "stytch-consumer.authenticate-magic-link"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-otp-sms
          description: "Send an SMS one-time passcode to a consumer user"
          hints:
            readOnly: false
            destructive: false
          call: "stytch-consumer.send-otp-sms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: authenticate-otp
          description: "Authenticate a consumer user with an OTP code"
          hints:
            readOnly: false
            destructive: false
          call: "stytch-consumer.authenticate-otp"
          outputParameters:
            - type: object
              mapping: "$."
        - name: authenticate-session
          description: "Validate a Stytch consumer session token or JWT"
          hints:
            readOnly: true
            idempotent: true
          call: "stytch-consumer.authenticate-session"
          outputParameters:
            - type: object
              mapping: "$."
        - name: revoke-session
          description: "Revoke an active Stytch consumer session"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "stytch-consumer.revoke-session"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: "Retrieve a Stytch consumer user by ID"
          hints:
            readOnly: true
          call: "stytch-consumer.get-user"
          with:
            user_id: "tools.user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-users
          description: "Search Stytch consumer users"
          hints:
            readOnly: true
            openWorld: true
          call: "stytch-consumer.search-users"
          outputParameters:
            - type: object
              mapping: "$."
